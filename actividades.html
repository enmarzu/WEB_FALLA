<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Actividades - Falla Rubén Darío - Fray Luis Colomer</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body{
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg,#9C4DFB,#AF57F1);
      margin:0;
      padding:0;
      text-align:center;
      color:white;
    }

    .container{
      max-width:1000px;
      margin:auto;
      padding:40px 20px;
    }

    .top-button{
      display:inline-flex;
      align-items:center;
      gap:10px;
      background:white;
      color:black;
      text-decoration:none;
      padding:12px 20px;
      border-radius:12px;
      font-weight:bold;
      margin-bottom:25px;
      transition:0.2s;
    }

    .top-button:hover{
      transform:scale(1.05);
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
    }

    h1{
      margin-bottom:20px;
    }

    .calendar{
      width:100%;
      max-width:900px;
      margin:0 auto;
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 10px 25px rgba(0,0,0,0.3);
      background:white;
    }

    .calendar iframe{
      width:100%;
      height:700px;
      border:0;
      display:block;
    }

    .footer{
      margin-top:30px;
      font-size:14px;
      opacity:0.8;
    }

    .whatsapp-float{
      position:fixed;
      width:60px;
      height:60px;
      bottom:25px;
      right:25px;
      background:#25D366;
      color:white;
      border-radius:50%;
      text-align:center;
      font-size:30px;
      box-shadow:0 5px 15px rgba(0,0,0,0.3);
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:100;
      transition:0.3s;
      text-decoration:none;
    }

    .whatsapp-float:hover{
      transform:scale(1.1);
    }

    @media (max-width: 768px){
      .calendar iframe{
        height:600px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <a href="index.html" class="top-button">
      <i class="fa-solid fa-arrow-left"></i> Volver
    </a>

    <h1>Actividades</h1>

    <div class="calendar">
      <iframe
        src="https://calendar.google.com/calendar/embed?src=redessocialesfallarubendario%40gmail.com&ctz=Europe%2FMadrid&mode=AGENDA"
        frameborder="0"
        scrolling="no">
      </iframe>
    </div>

    <div class="footer">
      📅 Calendario oficial de actividades
    </div>
  </div>

  <a href="https://wa.me/34600000000" class="whatsapp-float" target="_blank" aria-label="WhatsApp">
    <i class="fa-brands fa-whatsapp"></i>
  </a>

</body>
</html>
