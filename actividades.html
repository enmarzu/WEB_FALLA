<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Actividades - Falla Rubén Darío - Fray Luis Colomer</title>

  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <header class="topbar">
    <div class="topbar-inner">
      <a href="index.html" class="brand">
        <img src="ESCUDO2.png" alt="Escudo Falla Rubén Darío - Fray Luis Colomer">
        <span>Falla Rubén Darío - Fray Luis Colomer</span>
      </a>

      <button class="menu-toggle" id="menu-toggle" aria-label="Abrir menú">
        <i class="fa-solid fa-bars"></i>
      </button>

      <nav class="menu" id="menu">
        <a href="index.html"><i class="fa-solid fa-house"></i> Inicio</a>
        <a href="cuotas.html"><i class="fa-solid fa-euro-sign"></i> Cuotas</a>
        <a href="https://instagram.com/fallarubendario/" target="_blank"><i class="fa-brands fa-instagram"></i> Instagram</a>
        <a href="https://facebook.com/dariocolomer" target="_blank"><i class="fa-brands fa-facebook"></i> Facebook</a>
        <a href="https://www.tiktok.com/@fallarubendario" target="_blank"><i class="fa-brands fa-tiktok"></i> TikTok</a>
        <a href="mailto:secretaria_rudayfraluco@hotmail.com"><i class="fa-solid fa-envelope"></i> Contacto</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <div class="hero-title">
      <h1>Actividades</h1>
      <p>Consulta aquí el calendario oficial de la falla</p>
    </div>

    <div class="calendar-box">
      <div class="calendar">
        <iframe
          src="https://calendar.google.com/calendar/embed?src=redessocialesfallarubendario%40gmail.com&ctz=Europe%2FMadrid&mode=AGENDA"
          frameborder="0"
          scrolling="no">
        </iframe>
      </div>
    </div>
  </main>

  <div class="footer">
    📅 Calendario oficial de actividades
  </div>

  <a href="https://www.google.com/maps?q=39.476928,-0.352430"
     class="maps-float"
     target="_blank"
     aria-label="Cómo llegar">
    <i class="fa-solid fa-location-dot"></i>
  </a>

  <script>
    const menuToggle = document.getElementById("menu-toggle");
    const menu = document.getElementById("menu");
    const icon = menuToggle.querySelector("i");

    menuToggle.addEventListener("click", () => {
      menu.classList.toggle("show");

      if(menu.classList.contains("show")){
        icon.classList.remove("fa-bars");
        icon.classList.add("fa-xmark");
      } else {
        icon.classList.remove("fa-xmark");
        icon.classList.add("fa-bars");
      }
    });

    document.querySelectorAll(".menu a").forEach(link => {
      link.addEventListener("click", () => {
        menu.classList.remove("show");
        icon.classList.remove("fa-xmark");
        icon.classList.add("fa-bars");
      });
    });
  </script>

</body>
</html>
